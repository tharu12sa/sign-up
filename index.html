<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 class="titel "
            style="background-color: rgb(226, 139, 26); color: darkgrey;">Sign
            Up</h1>
        <form action="" style="margin-left: 50px;">
            <div class="row">
            <label class="lab" for>First Name:</label>
            <input class="inp" type="text" placeholder="Enter Firstname">
            <label class="lab" for>last name:</label>
            <input type="text" placeholder="Enter Lastname">
        </div>
        <br>
        <div class="row">
            <label class="lab" for>Date of birth:</label>
            <input type="date">
        </div>
        <br>
        <div class="row">
            <label class="lab" for>Gender:</label>
            <label class="lab" for>Male</label>
            <input type="radio" name="gender">
            <label class="lab" for>Female</label>
            <input type="radio" name="gender">
        </div>
        <br>
        <div class="row">
            <label class="lab" for>Country:</label>
            <select>
                <option>Select</option>
                <option>Sri Lanka</option>
                <option>India</option>
                <option>Japan</option>
                <option>China</option>
                <option>Australia</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>France</option>
                <option>Germany</option>
                <option>Brazil</option>
            </select>
        </div>
        <br>
        <div class="row">
            <fieldset>
                <legend class="lab" style="text-align: center;">Private
                    Details</legend>
                <label class="lab" for>Phone-number:</label>
                <input type="tel" placeholder="Contac-number">
                <br>
                <br>
                <label class="lab" for>E-mail:</label>
                <input type="email" placeholder="Enter email">
                <br>
                <br>
                <label class="lab" for>Address:</label>
                <textarea rows="5" cols="22" placeholder="Enter address"></textarea>
                <br>
                <br>
                <label class="lab" for>Password:</label>
                <input class="inp" type="password">
                <label class="lab" for>Confirm Password:</label>
                <input type="password">
            </fieldset>
        </div>
        <div class="row">
            <h6 class="lab"> <input type="checkbox">I Agree to the Terms of
                use</h6>
        </div>
        <div> <input type="button" id="button" value="Submit"></div>
        </form>
    </body>
</html>
